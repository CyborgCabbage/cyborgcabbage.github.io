---
layout: default
title: Home
---
<h1>Featured</h1>
<div class="box">
  {% assign posts = site.posts | where_exp: "item", "item.tags contains 'highlight'" %}
  {% for post in posts limit:3 %}
  <div class="entry"><a href="{{ post.url }}"><img src="{{ post.image }}" width=240 height=160></img><h2>{{ post.title }}<h2></a></div>
  {% endfor %}
</div>
<br>
<h1>All Posts</h1>
<ul> 
  {% for post in site.posts %}
  <li><a href="{{ post.url }}">{{ post.title }}</a> <span style="color: lightgrey; font-style: italic;">[{{ post.date }}]</span></li>
  {% endfor %}
</ul>
