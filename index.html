---
layout: default
title: Home
---
<div class="box">
  {% assign posts = site.posts | where_exp: "item", "item.tags contains 'highlight'" %}
  {% for post in posts limit:3 %}
  <div class="entry"><a href="{{ post.url }}"><img src="/assets/images/thumbnail.png"></img><h2>{{ post.title }}<h2></a></div>
  {% endfor %}
</div>
